    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
        }
        
        .page {
            min-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .page.hidden {
            display: none;
        }
        
        .home-page {
            text-align: center;
        }
        
        .home-page h1 {
            color: #c9d1d9;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .home-page p {
            color: #8b949e;
            font-size: 18px;
        }
        
        .home-page a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 20px;
            margin-top: 20px;
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid #58a6ff;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .home-page a:hover {
            background: rgba(88, 166, 255, 0.1);
            color: #79c0ff;
            transform: translateY(-2px);
        }
        
        .finhub-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .big-letter {
            display: grid;
            font-family: 'Courier New', monospace;
            font-size: 6px;
            line-height: 1;
            gap: 0;
        }
        
        .big-letter .small-letter {
            display: inline-block;
            width: 6px;
            height: 6px;
            text-align: center;
        }
        
        /* Colors for small letters from FINLEY */
        .small-letter.f { color: #58a6ff; }
        .small-letter.i { color: #f0883e; }
        .small-letter.n { color: #bc8cff; }
        .small-letter.l { color: #3fb950; }
        .small-letter.e { color: #f85149; }
        .small-letter.y { color: #ffa657; }
        
        /* Grid sizes for each big letter */
        .letter-f {
            grid-template-columns: repeat(16, 6px);
            grid-template-rows: repeat(15, 6px);
        }
        
        .letter-i {
            grid-template-columns: repeat(7, 6px);
            grid-template-rows: repeat(15, 6px);
        }
        
        .letter-n {
            grid-template-columns: repeat(16, 6px);
            grid-template-rows: repeat(15, 6px);
        }
        
        .letter-h {
            grid-template-columns: repeat(16, 6px);
            grid-template-rows: repeat(15, 6px);
        }
        
        .letter-u {
            grid-template-columns: repeat(16, 6px);
            grid-template-rows: repeat(15, 6px);
        }
        
        .letter-b {
            grid-template-columns: repeat(16, 6px);
            grid-template-rows: repeat(15, 6px);
        }
        
        .subtitle {
            color: #8b949e;
            font-size: 18px;
            text-align: center;
            margin-top: 20px;
        }
        
        /* Firebase Connection Status */
        .firebase-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .firebase-status.connected {
            background: rgba(63, 185, 80, 0.2);
            color: #3fb950;
            border: 1px solid #3fb950;
        }
        
        .firebase-status.disconnected {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
            border: 1px solid #f85149;
        }
        
        .firebase-status.checking {
            background: rgba(255, 166, 87, 0.2);
            color: #ffa657;
            border: 1px solid #ffa657;
        }
    </style>
</head>
<body>

    <!-- Main page with FinHub title -->
    <div class="page" id="mainPage">
        <div class="finhub-title">
            <div class="big-letter letter-f" id="letter-f"></div>
            <div class="big-letter letter-i" id="letter-i"></div>
            <div class="big-letter letter-n" id="letter-n"></div>
            <div class="big-letter letter-h" id="letter-h"></div>
            <div class="big-letter letter-u" id="letter-u"></div>
            <div class="big-letter letter-b" id="letter-b"></div>
        </div>
        
        <p class="subtitle">Built with code, powered by Finley</p>
    </div>
    
    <!-- Home page -->
    <div class="page home-page hidden" id="homePage">
        <h1>Welcome to the home</h1>
        <p>This is the home page</p>
        <a href="https://sso.browardschools.com/" target="_blank">Broward Schools Login</a>
    </div>
    
    <script>
        // Generate big letters from small letters (FINLEY)
        const finleyLetters = ['F', 'I', 'N', 'L', 'E', 'Y'];
        const finleyColors = {
            'F': '#58a6ff',
            'I': '#f0883e',
            'N': '#bc8cff',
            'L': '#3fb950',
            'E': '#f85149',
            'Y': '#ffa657'
        };
        
        function generateBigLetter(letterId, pattern) {
            const container = document.getElementById(letterId);
            if (!container) return;
            
            container.innerHTML = '';
            for (let row of pattern) {
                for (let char of row) {
                    const span = document.createElement('span');
                    span.className = 'small-letter';
                    if (char === 'X') {
                        // Randomly pick a letter from FINLEY
                        const randomLetter = finleyLetters[Math.floor(Math.random() * finleyLetters.length)];
                        span.textContent = randomLetter;
                        span.classList.add(randomLetter.toLowerCase());
                    } else {
                        span.textContent = ' ';
                    }
                    container.appendChild(span);
                }
            }
        }
        
        // Letter patterns (X = filled, space = empty)
        // F: 16 columns x 15 rows
        const letterPatterns = {
            'f': [
                'XXXXXXXXXXXXXXXX',
                'XXXXXXXXXXXXXXXX',

            // I: 7 columns x 15 rows
            'i': [

                '  XXX  ',

            ],
            // N: 16 columns x 15 rows
            'n': [
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX  XXX        XXX',
                'XXX  XXX        XXX',
                'XXX   XXX       XXX',
                'XXX   XXX       XXX',
                'XXX    XXX      XXX',
                'XXX    XXX      XXX',
                'XXX     XXX     XXX',

            // H: 16 columns x 15 rows
            'h': [
                'XXX             XXX',

                'XXXXXXXXXXXXXXXX',

                'XXX             XXX',

                'XXX             XXX'
            ],
            // U: 16 columns x 15 rows
            'u': [
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',

                'XXX             XXX',
                'XXX             XXX',
                'XXX             XXX',
                'XXXXXXXXXXXXXXXX',
                'XXXXXXXXXXXXXXXX'
            ],
            // B: 16 columns x 15 rows
            'b': [
                'XXXXXXXXXXXXXXXX',

                'XXX        XXX   ',

                'XXX        XXX   ',
                'XXX        XXX   ',
                'XXXXXXXXXXXXXXXX',
                'XXXXXXXXXXXXXXXX',

                'XXX        XXX   ',
                'XXX        XXX   ',
                'XXX        XXX   ',
                'XXXXXXXXXXXXXXXX',
                'XXXXXXXXXXXXXXXX'
            ]
        };
        
        // Generate all letters on page load
        document.addEventListener('DOMContentLoaded', () => {
            generateBigLetter('letter-f', letterPatterns.f);
            generateBigLetter('letter-i', letterPatterns.i);
            generateBigLetter('letter-n', letterPatterns.n);
            generateBigLetter('letter-h', letterPatterns.h);
            generateBigLetter('letter-u', letterPatterns.u);
            generateBigLetter('letter-b', letterPatterns.b);
        });
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB_jv2W9Hvt0QFJlVN4ZcdrT1mtwP-fWFE",
            authDomain: "finhub-41eaf.firebaseapp.com",
            databaseURL: "https://finhub-41eaf-default-rtdb.firebaseio.com",
            projectId: "finhub-41eaf",
            storageBucket: "finhub-41eaf.firebasestorage.app",
            messagingSenderId: "96393027883",
            appId: "1:96393027883:web:4db59a7a6d020c7eba256e",
            measurementId: "G-GDEJMDDEG6"
        };
        
        // Initialize Firebase
        let firebaseApp, database;
        
        // Function to check Firebase connection status
        function checkFirebaseConnection() {
            const statusEl = document.getElementById('firebaseStatus');
            if (!statusEl) return;
            
            statusEl.classList.remove('connected', 'disconnected');
            statusEl.classList.add('checking');
            statusEl.textContent = 'Checking connection...';
            
            if (database) {
                // Try to read from Firebase to verify connection
                const testRef = database.ref('.info/connected');
                testRef.once('value', (snapshot) => {
                    if (snapshot.val() === true) {
                        statusEl.classList.remove('checking', 'disconnected');
                        statusEl.classList.add('connected');
                        statusEl.textContent = '✅ Connected to Firebase';
                    } else {
                        statusEl.classList.remove('checking', 'connected');
                        statusEl.classList.add('disconnected');
                        statusEl.textContent = '❌ Disconnected from Firebase';
                    }
                }).catch((error) => {
                    statusEl.classList.remove('checking', 'connected');
                    statusEl.classList.add('disconnected');
                    statusEl.textContent = '❌ Connection failed';
                    console.error('Firebase connection check failed:', error);
                });
            } else {
                statusEl.classList.remove('checking', 'connected');
                statusEl.classList.add('disconnected');
                statusEl.textContent = '❌ Firebase not initialized';
            }
        }
        
        // Initialize Firebase
        if (firebaseConfig && typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps || firebase.apps.length === 0) {
                    firebaseApp = firebase.initializeApp(firebaseConfig);
                    database = firebase.database();
                    console.log('✅ Firebase connected - Online features enabled!');
                } else {
                    firebaseApp = firebase.app();
                    database = firebase.database();
                }
            } catch (e) {
                console.warn('⚠️ Firebase initialization failed, using localStorage fallback:', e);
                database = null;
            }
        } else {
            database = null;
            console.log('ℹ️ Running in offline mode (localStorage). To enable online features, configure Firebase.');
        }
        
        // ============================================
        // FIREBASE REALTIME DATABASE FUNCTIONS
        // ============================================
        
        // 1. WRITE DATA (Save data to Firebase)
        function writeToFirebase(path, data) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).set(data)
                .then(() => {
                    console.log('✅ Data written to:', path);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Error writing to Firebase:', error);
                    return false;
                });
        }
        
        // 2. READ DATA ONCE (Get data once)
        function readFromFirebase(path) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).once('value')
                .then((snapshot) => {
                    return snapshot.val();
                })
                .catch((error) => {
                    console.error('❌ Error reading from Firebase:', error);
                    return null;
                });
        }
        
        // 3. LISTEN TO CHANGES (Real-time updates)
        function listenToFirebase(path, callback) {
            if (!database) {
                console.error('Firebase not connected');
                return null;
            }
            const ref = database.ref(path);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                callback(data);
            });
            // Return the ref so you can stop listening later with: ref.off('value')
            return ref;
        }
        
        // 4. UPDATE DATA (Update specific fields without overwriting)
        function updateFirebase(path, updates) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).update(updates)
                .then(() => {
                    console.log('✅ Data updated at:', path);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Error updating Firebase:', error);
                    return false;
                });
        }
        
        // 5. PUSH DATA (Add to a list - Firebase generates unique ID)
        function pushToFirebase(path, data) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).push(data)
                .then((ref) => {
                    console.log('✅ Data pushed to:', path, 'with ID:', ref.key);
                    return ref.key;
                })
                .catch((error) => {
                    console.error('❌ Error pushing to Firebase:', error);
                    return null;
                });
        }
        
        // 6. DELETE DATA
        function deleteFromFirebase(path) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).remove()
                .then(() => {
                    console.log('✅ Data deleted from:', path);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Error deleting from Firebase:', error);
                    return false;
                });
        }
        
        // ============================================
        // EXAMPLE USAGE (Uncomment to test)
        // ============================================
        
        /*
        // Example 1: Write data
        writeToFirebase('test/message', { text: 'Hello Firebase!', timestamp: Date.now() });
        
        // Example 2: Read data once
        readFromFirebase('test/message').then(data => {
            console.log('Read data:', data);
        });
        
        // Example 3: Listen to real-time changes
        const listener = listenToFirebase('test/message', (data) => {

        // Example 5: Push to a list
        pushToFirebase('test/messages', { text: 'New message', user: 'User1' });
        
        // Example 6: Delete data
        deleteFromFirebase('test/message');
        */
        
        // Check connection status on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Initial check after a short delay to allow Firebase to initialize
            setTimeout(() => {
                checkFirebaseConnection();
            }, 1000);
            
            // Recheck every 10 seconds
            setInterval(() => {
                checkFirebaseConnection();
            }, 10000);
        });
    </script>
