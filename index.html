    <style>
        * {
            margin: 0;
            padding: 0;

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

<body>
    <!-- Firebase Connection Status -->
    <div class="firebase-status checking" id="firebaseStatus">Checking connection...</div>
    
    <!-- User Info (shown when logged in) -->

    <!-- Login Page -->
    <div class="page login-page" id="loginPage">
        <div class="login-container">
            <h2>Welcome to FinHub</h2>
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('login')">Login</div>

            <!-- Login Form -->
            <div class="login-form active" id="loginForm">

                    <label for="loginUsername">Username</label>

                    <label for="loginPassword">Password</label>

                </div>

            <div class="login-form" id="signupForm">

                    <input type="password" id="signupPassword" placeholder="Choose a password" autocomplete="new-password">

                <div class="form-group">
                    <label for="signupPasswordConfirm">Confirm Password</label>
                    <input type="password" id="signupPasswordConfirm" placeholder="Confirm your password" autocomplete="new-password">
                </div>
                <button class="login-btn" onclick="handleSignup()">Sign Up</button>

    <!-- Main page with FinHub title -->
    <div class="page hidden" id="mainPage">
        <div class="finhub-title" id="finhubTitle">
            <span class="title-letter f" data-letter="F">F</span>

        <p class="subtitle">Built with code, powered by Finley</p>

    <!-- Home page -->
    <div class="page home-page hidden" id="homePage">
        <h1>Welcome to the home</h1>
        <p>This is the home page</p>
        <a href="https://sso.browardschools.com/" target="_blank">Broward Schools Login</a>
    </div>
    
    <script>
        // Mouse proximity effect for FINHUB title
        document.addEventListener('DOMContentLoaded', () => {
            const titleContainer = document.getElementById('finhubTitle');
            const letters = titleContainer.querySelectorAll('.title-letter');
            
            // Track mouse position
            document.addEventListener('mousemove', (e) => {
                letters.forEach((letter) => {
                    const rect = letter.getBoundingClientRect();
                    const letterCenterX = rect.left + rect.width / 2;
                    const letterCenterY = rect.top + rect.height / 2;
                    
                    // Calculate distance from mouse to letter center
                    const distanceX = e.clientX - letterCenterX;
                    const distanceY = e.clientY - letterCenterY;
                    const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
                    
                    // Maximum effect distance (200px)
                    const maxDistance = 200;
                    const proximity = Math.max(0, 1 - (distance / maxDistance));
                    
                    // Apply effects based on proximity
                    const scale = 1 + (proximity * 0.3); // Scale up to 1.3x
                    const rotate = proximity * 15 * (Math.random() > 0.5 ? 1 : -1); // Rotate up to 15deg
                    const translateY = -proximity * 20; // Move up
                    
                    // Apply transform
                    letter.style.transform = `scale(${scale}) rotate(${rotate}deg) translateY(${translateY}px)`;
                    
                    // Add glow effect
                    const glowIntensity = proximity * 0.8;
                    letter.style.filter = `drop-shadow(0 0 ${glowIntensity * 20}px currentColor)`;
                    letter.style.opacity = 0.7 + (proximity * 0.3);
                });
            });
            
            // Reset when mouse leaves
            document.addEventListener('mouseleave', () => {
                letters.forEach((letter) => {
                    letter.style.transform = 'scale(1) rotate(0deg) translateY(0px)';
                    letter.style.filter = 'none';
                    letter.style.opacity = '1';
                });
            });
        });
        
        // ============================================
        // AUTHENTICATION SYSTEM
        // ============================================
        
        // Simple password hashing (for basic security)
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return hash.toString();
        }
        
        // Switch between login and signup tabs
        function switchTab(tab) {
            const loginTab = document.querySelector('.login-tab:first-child');
            const signupTab = document.querySelector('.login-tab:last-child');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                document.getElementById('loginError').textContent = '';
                document.getElementById('signupError').textContent = '';
                document.getElementById('signupSuccess').textContent = '';
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                document.getElementById('loginError').textContent = '';
                document.getElementById('signupError').textContent = '';
                document.getElementById('signupSuccess').textContent = '';
            }
        }
        
        // Handle Sign Up
        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const errorEl = document.getElementById('signupError');
            const successEl = document.getElementById('signupSuccess');
            
            errorEl.textContent = '';
            successEl.textContent = '';
            
            // Validation
            if (!username || !password || !passwordConfirm) {
                errorEl.textContent = 'Please fill in all fields';
                return;
            }
            
            if (username.length < 3) {
                errorEl.textContent = 'Username must be at least 3 characters';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            if (password !== passwordConfirm) {
                errorEl.textContent = 'Passwords do not match';
                return;
            }
            
            if (!database) {
                errorEl.textContent = 'Firebase not connected. Please wait...';
                return;
            }
            
            // Check if username already exists
            const userExists = await readFromFirebase(`userAccounts/${username}`);
            if (userExists) {
                errorEl.textContent = 'Username already exists';
                return;
            }
            
            // Create account
            const passwordHash = hashPassword(password);
            const userData = {
                username: username,
                passwordHash: passwordHash,
                createdAt: Date.now()
            };
            
            const success = await writeToFirebase(`userAccounts/${username}`, userData);
            
            if (success) {
                successEl.textContent = 'Account created! You can now login.';
                // Clear form
                document.getElementById('signupUsername').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('signupPasswordConfirm').value = '';
                // Switch to login tab after 1 second
                setTimeout(() => {
                    switchTab('login');
                }, 1000);
            } else {
                errorEl.textContent = 'Failed to create account. Please try again.';
            }
        }
        
        // Handle Login
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            errorEl.textContent = '';
            
            // Validation
            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password';
                return;
            }
            
            if (!database) {
                errorEl.textContent = 'Firebase not connected. Please wait...';
                return;
            }
            
            // Check credentials
            const userData = await readFromFirebase(`userAccounts/${username}`);
            
            if (!userData) {
                errorEl.textContent = 'Invalid username or password';
                return;
            }
            
            const passwordHash = hashPassword(password);
            if (userData.passwordHash !== passwordHash) {
                errorEl.textContent = 'Invalid username or password';
                return;
            }
            
            // Login successful
            localStorage.setItem('loggedInUsername', username);
            localStorage.setItem('loginTime', Date.now().toString());
            
            // Show main page
            showMainPage();
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('loggedInUsername');
            localStorage.removeItem('loginTime');
            showLoginPage();
        }
        
        // Check login status
        function checkLoginStatus() {
            const username = localStorage.getItem('loggedInUsername');
            if (username) {
                showMainPage();
            } else {
                showLoginPage();
            }
        }
        
        // Show login page
        function showLoginPage() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('userInfo').classList.add('hidden');
        }
        
        // Show main page
        function showMainPage() {
            const username = localStorage.getItem('loggedInUsername');
            if (username) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('loggedInUsername').textContent = username;
            } else {
                showLoginPage();
            }
        }
        
        // Allow Enter key to submit forms
        document.addEventListener('DOMContentLoaded', () => {
            const loginPassword = document.getElementById('loginPassword');
            const signupPasswordConfirm = document.getElementById('signupPasswordConfirm');
            
            if (loginPassword) {
                loginPassword.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }
            
            if (signupPasswordConfirm) {
                signupPasswordConfirm.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleSignup();
                });
            }
        });
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB_jv2W9Hvt0QFJlVN4ZcdrT1mtwP-fWFE",
            authDomain: "finhub-41eaf.firebaseapp.com",
            databaseURL: "https://finhub-41eaf-default-rtdb.firebaseio.com",
            projectId: "finhub-41eaf",
            storageBucket: "finhub-41eaf.firebasestorage.app",
            messagingSenderId: "96393027883",
            appId: "1:96393027883:web:4db59a7a6d020c7eba256e",
            measurementId: "G-GDEJMDDEG6"
        };
        
        // Initialize Firebase
        let firebaseApp, database;
        
        // Function to check Firebase connection status
        function checkFirebaseConnection() {
            const statusEl = document.getElementById('firebaseStatus');
            if (!statusEl) return;
            
            statusEl.classList.remove('connected', 'disconnected');
            statusEl.classList.add('checking');
            statusEl.textContent = 'Checking connection...';
            
            if (database) {
                // Try to read from Firebase to verify connection
                const testRef = database.ref('.info/connected');
                testRef.once('value', (snapshot) => {
                    if (snapshot.val() === true) {
                        statusEl.classList.remove('checking', 'disconnected');
                        statusEl.classList.add('connected');
                        statusEl.textContent = '✅ Connected to Firebase';
                    } else {
                        statusEl.classList.remove('checking', 'connected');
                        statusEl.classList.add('disconnected');
                        statusEl.textContent = '❌ Disconnected from Firebase';
                    }
                }).catch((error) => {
                    statusEl.classList.remove('checking', 'connected');
                    statusEl.classList.add('disconnected');
                    statusEl.textContent = '❌ Connection failed';
                    console.error('Firebase connection check failed:', error);
                });
            } else {
                statusEl.classList.remove('checking', 'connected');
                statusEl.classList.add('disconnected');
                statusEl.textContent = '❌ Firebase not initialized';
            }
        }
        
        // Initialize Firebase
        if (firebaseConfig && typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps || firebase.apps.length === 0) {
                    firebaseApp = firebase.initializeApp(firebaseConfig);
                    database = firebase.database();
                    console.log('✅ Firebase connected - Online features enabled!');
                } else {
                    firebaseApp = firebase.app();
                    database = firebase.database();
                }
            } catch (e) {
                console.warn('⚠️ Firebase initialization failed, using localStorage fallback:', e);
                database = null;
            }
        } else {
            database = null;
            console.log('ℹ️ Running in offline mode (localStorage). To enable online features, configure Firebase.');
        }
        
        // ============================================
        // FIREBASE REALTIME DATABASE FUNCTIONS
        // ============================================
        
        // 1. WRITE DATA (Save data to Firebase)
        function writeToFirebase(path, data) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).set(data)
                .then(() => {
                    console.log('✅ Data written to:', path);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Error writing to Firebase:', error);
                    return false;
                });
        }
        
        // 2. READ DATA ONCE (Get data once)
        function readFromFirebase(path) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).once('value')
                .then((snapshot) => {
                    return snapshot.val();
                })
                .catch((error) => {
                    console.error('❌ Error reading from Firebase:', error);
                    return null;
                });
        }
        
        // 3. LISTEN TO CHANGES (Real-time updates)
        function listenToFirebase(path, callback) {
            if (!database) {
                console.error('Firebase not connected');
                return null;
            }
            const ref = database.ref(path);
            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                callback(data);
            });
            // Return the ref so you can stop listening later with: ref.off('value')
            return ref;
        }
        
        // 4. UPDATE DATA (Update specific fields without overwriting)
        function updateFirebase(path, updates) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).update(updates)
                .then(() => {
                    console.log('✅ Data updated at:', path);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Error updating Firebase:', error);
                    return false;
                });
        }
        
        // 5. PUSH DATA (Add to a list - Firebase generates unique ID)
        function pushToFirebase(path, data) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).push(data)
                .then((ref) => {
                    console.log('✅ Data pushed to:', path, 'with ID:', ref.key);
                    return ref.key;
                })
                .catch((error) => {
                    console.error('❌ Error pushing to Firebase:', error);
                    return null;
                });
        }
        
        // 6. DELETE DATA
        function deleteFromFirebase(path) {
            if (!database) {
                console.error('Firebase not connected');
                return Promise.reject('Firebase not connected');
            }
            return database.ref(path).remove()
                .then(() => {
                    console.log('✅ Data deleted from:', path);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Error deleting from Firebase:', error);
                    return false;
                });
        }
