<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
        }
        
        .page {
            min-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .page.hidden {
            display: none;
        }
        
        .home-page {
            text-align: center;
        }
        
        .home-page h1 {
            color: #c9d1d9;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .home-page p {
            color: #8b949e;
            font-size: 18px;
        }
        
        .home-page a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 20px;
            margin-top: 20px;
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid #58a6ff;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .home-page a:hover {
            background: rgba(88, 166, 255, 0.1);
            color: #79c0ff;
            transform: translateY(-2px);
        }
        
        .finhub-title {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .big-letter {
            display: grid;
            font-family: 'Courier New', monospace;
            font-size: 8px;
            line-height: 1;
            color: #c9d1d9;
            gap: 0;
        }
        
        .big-letter .small-letter {
            display: inline-block;
            width: 8px;
            height: 8px;
            text-align: center;
        }
        
        /* Big F made of small letters - 3 thick, 2x tall */
        .letter-f {
            grid-template-columns: repeat(21, 8px);
            grid-template-rows: repeat(20, 8px);
        }
        
        /* Big i made of small letters - 3 thick, 2x tall */
        .letter-i {
            grid-template-columns: repeat(9, 8px);
            grid-template-rows: repeat(20, 8px);
        }
        
        /* Big n made of small letters - 3 thick, 2x tall */
        .letter-n {
            grid-template-columns: repeat(21, 8px);
            grid-template-rows: repeat(20, 8px);
        }
        
        /* Big H made of small letters - 3 thick, 2x tall */
        .letter-h {
            grid-template-columns: repeat(21, 8px);
            grid-template-rows: repeat(20, 8px);
        }
        
        /* Big u made of small letters - 3 thick, 2x tall */
        .letter-u {
            grid-template-columns: repeat(21, 8px);
            grid-template-rows: repeat(20, 8px);
        }
        
        /* Big b made of small letters - 3 thick, 2x tall */
        .letter-b {
            grid-template-columns: repeat(21, 8px);
            grid-template-rows: repeat(20, 8px);
        }
        
        /* Colors for small letters */
        .small-letter.f { color: #58a6ff; }
        .small-letter.i { color: #f0883e; }
        .small-letter.n { color: #bc8cff; }
        .small-letter.l { color: #3fb950; }
        .small-letter.e { color: #f85149; }
        .small-letter.y { color: #ffa657; }
        
        .subtitle {
            color: #8b949e;
            font-size: 18px;
            text-align: center;
            margin-top: 20px;
        }
        
        .letters-source {
            color: #6e7681;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }
        
        /* Firebase Connection Status */
        .firebase-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .firebase-status.connected {
            background: rgba(63, 185, 80, 0.2);
            color: #3fb950;
            border: 1px solid #3fb950;
        }
        
        .firebase-status.disconnected {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
            border: 1px solid #f85149;
        }
        
        .firebase-status.checking {
            background: rgba(255, 166, 87, 0.2);
            color: #ffa657;
            border: 1px solid #ffa657;
        }
    </style>
</head>
<body>
    <!-- Firebase Connection Status -->
    <div class="firebase-status checking" id="firebaseStatus">Checking connection...</div>
    
    <!-- Main page with FinHub title -->
    <div class="page" id="mainPage">
        <div class="finhub-title">
            <!-- Big F made of small letters -->
            <div class="big-letter letter-f" id="letter-f"></div>
            <!-- Big i made of small letters -->
            <div class="big-letter letter-i" id="letter-i"></div>
            <!-- Big n made of small letters -->
            <div class="big-letter letter-n" id="letter-n"></div>
            <!-- Big H made of small letters -->
            <div class="big-letter letter-h" id="letter-h"></div>
            <!-- Big u made of small letters -->
            <div class="big-letter letter-u" id="letter-u"></div>
            <!-- Big b made of small letters -->
            <div class="big-letter letter-b" id="letter-b"></div>
        </div>
        
        <p class="subtitle">Built with code, powered by Finley</p>
    </div>
    
    <!-- Home page -->
    <div class="page home-page hidden" id="homePage">
        <h1>Welcome to the home</h1>
        <p>This is the home page</p>
        <a href="https://sso.browardschools.com/" target="_blank">Broward Schools Login</a>
    </div>
    
    <script>
        // Generate the big letters from small letters
        function generateBigLetter(letterId, letter, pattern) {
            const container = document.getElementById(letterId);
            if (!container) return;
            
            container.innerHTML = '';
            for (let row of pattern) {
                for (let char of row) {
                    const span = document.createElement('span');
                    span.className = 'small-letter';
                    if (char === 'X') {
                        span.textContent = letter;
                        span.classList.add(letter.toLowerCase());
                    } else {
                        span.textContent = ' ';
                    }
                    container.appendChild(span);
                }
            }
        }
        
        // Letter patterns (X = letter, space = empty)
        const letterPatterns = {
            'f': [
                'XXXXXXXXXXXXXXXXXXXXX',

                'XXX                 ',

            ],
            'n': [
                'XXX                 XXX',

                'XXX  XXX            XXX',
                'XXX  XXX            XXX',
                'XXX  XXX            XXX',
                'XXX   XXX           XXX',
                'XXX   XXX           XXX',

            ],
            'h': [

            ],

                'XXXXXXXXXXXXXXXXXXXXX'
            ]
        };
        
        // Generate all letters on page load
        document.addEventListener('DOMContentLoaded', () => {
            generateBigLetter('letter-f', 'F', letterPatterns.f);
            generateBigLetter('letter-i', 'I', letterPatterns.i);
            generateBigLetter('letter-n', 'N', letterPatterns.n);
            generateBigLetter('letter-h', 'H', letterPatterns.h);
            generateBigLetter('letter-u', 'U', letterPatterns.u);
            generateBigLetter('letter-b', 'B', letterPatterns.b);
        });
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB_jv2W9Hvt0QFJlVN4ZcdrT1mtwP-fWFE",
            authDomain: "finhub-41eaf.firebaseapp.com",
            databaseURL: "https://finhub-41eaf-default-rtdb.firebaseio.com",
            projectId: "finhub-41eaf",

            messagingSenderId: "96393027883",

            measurementId: "G-GDEJMDDEG6"
        };
        
        // Initialize Firebase
        let firebaseApp, database;
        
        // Function to check Firebase connection status
        function checkFirebaseConnection() {
            const statusEl = document.getElementById('firebaseStatus');
            if (!statusEl) return;
            
            statusEl.classList.remove('connected', 'disconnected');
            statusEl.classList.add('checking');
            statusEl.textContent = 'Checking connection...';
            
            if (database) {
                // Try to read from Firebase to verify connection
                const testRef = database.ref('.info/connected');
                testRef.once('value', (snapshot) => {
                    if (snapshot.val() === true) {
                        statusEl.classList.remove('checking', 'disconnected');
                        statusEl.classList.add('connected');
                        statusEl.textContent = '✅ Connected to Firebase';
                    } else {
                        statusEl.classList.remove('checking', 'connected');
                        statusEl.classList.add('disconnected');
                        statusEl.textContent = '❌ Disconnected from Firebase';
                    }
                }).catch((error) => {
                    statusEl.classList.remove('checking', 'connected');
                    statusEl.classList.add('disconnected');
                    statusEl.textContent = '❌ Connection failed';
                    console.error('Firebase connection check failed:', error);
                });
            } else {
                statusEl.classList.remove('checking', 'connected');
                statusEl.classList.add('disconnected');
                statusEl.textContent = '❌ Firebase not initialized';
            }
        }
        
        // Initialize Firebase
        if (firebaseConfig && typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps || firebase.apps.length === 0) {
                    firebaseApp = firebase.initializeApp(firebaseConfig);
                    database = firebase.database();
                    console.log('✅ Firebase connected - Online features enabled!');
                } else {
                    firebaseApp = firebase.app();
                    database = firebase.database();
                }
            } catch (e) {
                console.warn('⚠️ Firebase initialization failed, using localStorage fallback:', e);
                database = null;
            }
        } else {
            database = null;
            console.log('ℹ️ Running in offline mode (localStorage). To enable online features, configure Firebase.');
        }
        
        // Check connection status on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Initial check after a short delay to allow Firebase to initialize
            setTimeout(() => {
                checkFirebaseConnection();
            }, 1000);
            
            // Recheck every 10 seconds
            setInterval(() => {
                checkFirebaseConnection();
            }, 10000);
        });
